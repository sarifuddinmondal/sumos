<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Settings</title>
    <style>
        :root { --bg-color: #0d1b2a; --text-color: #e0e1dd; --accent-color: #00bfff; --card-bg: rgba(255, 255, 255, 0.05); --border-color: rgba(255, 255, 255, 0.2); --focus-shadow: 0 0 15px rgba(0, 191, 255, 0.6); }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; outline: none; }
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Arial, sans-serif; padding: 40px; }
        h1, h2 { font-weight: 300; color: var(--accent-color); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 20px; }
        .container { display: grid; grid-template-columns: 1fr; gap: 40px; }
        .setting-card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border-color); }
        .nav-item { padding: 15px; border: 2px solid transparent; border-radius: 8px; transition: all 0.2s ease; }
        .nav-item.focused { border-color: var(--accent-color); box-shadow: var(--focus-shadow); background: rgba(0, 191, 255, 0.1); }
        input[type="text"] { font-size: 16px; padding: 12px; background: #000; border: 1px solid var(--border-color); color: var(--text-color); border-radius: 8px; width: calc(100% - 120px); }
        .btn { background: var(--accent-color); color: #000; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; margin-left: 10px; cursor: pointer; transition: all 0.2s ease; }
        .btn:hover { background: #00a0cc; }
        #playlist-list { list-style: none; margin-top: 20px; max-height: 200px; overflow-y: auto; }
        #playlist-list li { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px; margin-bottom: 5px; font-size: 14px; word-break: break-all; }
        #message-area { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 15px 30px; border-radius: 8px; display: none; z-index: 100; text-align: center; }
        #message-area.success { background: #2ecc71; color: black;}
        #message-area.error { background: #e74c3c; }
        .home-link { position: fixed; top: 20px; left: 20px; color: #fff; text-decoration: none; font-size: 18px; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 8px; transition: 0.2s; z-index: 10; }
        .home-link:hover { background: rgba(0, 255, 255, 0.2); }
    </style>
</head>
<body>
    <a href="/" class="home-link">Home</a>
    <h1>TV Settings</h1>

    <div class="container">
        <div class="setting-card">
            <h2>Add IPTV Playlist</h2>
            <div id="playlist-form" class="nav-item">
                <input type="text" id="playlist-url" placeholder="http://example.com/playlist.m3u">
                <button id="playlist-save" class="btn">Add +</button>
            </div>
            
            <h2 style="margin-top: 30px;">Saved Playlists</h2>
            <ul id="playlist-list">
                {% for playlist in playlists %}
                    <li>{{ playlist }}</li>
                {% else %}
                    <li style="color: #888;">No playlists saved yet.</li>
                {% endfor %}
            </ul>
        </div>
    </div>

    <div id="message-area"></div>

    <script>
        const navItems = document.querySelectorAll('.nav-item');
        let focusedIndex = 0;

        function updateFocus() {
            navItems.forEach((item, index) => {
                item.classList.toggle('focused', index === focusedIndex);
                if(index === focusedIndex) {
                    item.querySelector('input, button')?.focus();
                }
            });
        }
        
        function handleKeyPress(e) {
            if (e.key === 'F5') {
                e.preventDefault();
                location.reload();
                return;
            }
            if (e.key === 'Escape' || e.key === 'Backspace') {
                e.preventDefault();
                window.location.href = '/settings';
                return;
            }
            e.preventDefault();
            switch (e.key) {
                case 'ArrowDown': focusedIndex = (focusedIndex + 1) % navItems.length; break;
                case 'ArrowUp': focusedIndex = (focusedIndex - 1 + navItems.length) % navItems.length; break;
                case 'Enter': navItems[focusedIndex]?.querySelector('button')?.click(); break;
                case 'F1': window.location.href = '/'; break;
            }
            updateFocus();
        }

        function showMessage(text, type = 'info') {
            const msgArea = document.getElementById('message-area');
            msgArea.textContent = text;
            msgArea.className = type;
            msgArea.style.display = 'block';
            setTimeout(() => { msgArea.style.display = 'none'; }, 4000);
        }

        document.getElementById('playlist-save').addEventListener('click', async () => {
            const urlInput = document.getElementById('playlist-url');
            const url = urlInput.value;
            if (!url) return showMessage('Please enter a URL', 'error');

            showMessage('Fetching new playlist...');
            try {
                const response = await fetch('/api/playlists/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    showMessage(result.message, 'success');
                    urlInput.value = '';
                    // Add to list visually
                    const list = document.getElementById('playlist-list');
                    if (list.querySelector('li')?.style.color === 'rgb(136, 136, 136)') {
                        list.innerHTML = ''; // Clear "No playlists" message
                    }
                    const newItem = document.createElement('li');
                    newItem.textContent = url;
                    list.appendChild(newItem);
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (e) {
                showMessage('Failed to add playlist.', 'error');
            }
        });
        
        document.addEventListener('keydown', handleKeyPress);
        updateFocus();
    </script>
</body>
</html>

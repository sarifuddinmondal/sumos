
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartOS Login/Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --cyan: #00ffff; --green: #00ff88; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; width: 380px; border: 1px solid rgba(0, 255, 255, 0.2); text-align: center; }
        h2 { color: var(--cyan); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; color: #888; transition: 0.3s; font-weight: bold; }
        .tab.active { color: var(--cyan); border-bottom: 2px solid var(--cyan); }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 11px; color: var(--cyan); display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--cyan); }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; background: linear-gradient(45deg, var(--cyan), #0088ff); color: #000; margin-top: 10px; display: flex; align-items: center; justify-content: center; min-height: 50px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #msg { margin-top: 15px; font-size: 13px; font-weight: bold; word-break: break-word; min-height: 20px; }
        .home-link { position: fixed; top: 20px; left: 20px; color: #fff; text-decoration: none; font-size: 18px; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 8px; transition: 0.2s; }
        .home-link:hover { background: rgba(0, 255, 255, 0.2); }
        
        .spinner {
            border: 3px solid rgba(0,0,0,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s ease-in-out infinite;
            display: none;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn.loading .btn-text { display: none; }
        .btn.loading .spinner { display: block; }

    </style>
</head>
<body>

<a href="/" class="home-link"><i class="fas fa-arrow-left"></i> Home</a>

<div class="container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">LOGIN</div>
        <div class="tab" onclick="switchTab('register')">REGISTER</div>
    </div>

    <!-- Login Section -->
    <div id="login-section" class="form-section active">
        <h2>Welcome Back</h2>
        <div class="input-group">
            <label>Mobile Number</label>
            <input type="tel" id="login-mobile" placeholder="Enter 10 digit number" maxlength="10">
        </div>
        <button class="btn" onclick="handleLogin()" id="login-btn">
            <span class="btn-text">Login Now</span>
            <div class="spinner"></div>
        </button>
    </div>

    <!-- Register Section -->
    <div id="register-section" class="form-section">
        <h2>New Registration</h2>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="reg-name" placeholder="Full Name">
        </div>
        <div class="input-group">
            <label>Mobile Number</label>
            <input type="tel" id="reg-mobile" placeholder="10 digit number" maxlength="10">
        </div>
        <div class="input-group">
            <label>State</label>
            <input type="text" id="reg-state" placeholder="e.g. West Bengal">
        </div>
        <div class="input-group">
            <label>Pin Code</label>
            <input type="tel" id="reg-pin" placeholder="6 digit pin" maxlength="6">
        </div>
        <button class="btn" onclick="handleRegistration()" id="reg-btn">
            <span class="btn-text">Create Account</span>
            <div class="spinner"></div>
        </button>
    </div>

    <div id="msg"></div>
</div>

<script>
    const msgDiv = document.getElementById('msg');
    const loginBtn = document.getElementById('login-btn');
    const regBtn = document.getElementById('reg-btn');


    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        
        if (tab === 'login') {
            document.querySelector('.tab:nth-child(1)').classList.add('active');
            document.getElementById('login-section').classList.add('active');
        } else {
            document.querySelector('.tab:nth-child(2)').classList.add('active');
            document.getElementById('register-section').classList.add('active');
        }
        msgDiv.textContent = "";
    }

    async function handleLogin() {
        const mobile = document.getElementById('login-mobile').value.trim();
        if (mobile.length !== 10) { showMsg("Enter valid mobile", "red"); return; }
        
        loginBtn.classList.add('loading');
        loginBtn.disabled = true;
        showMsg("Checking...", "cyan");

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mobile: mobile})
            });
            const data = await res.json();
            if (data.status === 'success') {
                showMsg("Logged in! Redirecting...", "lime");
                setTimeout(() => location.href = '/', 1000);
            } else {
                showMsg(data.message, "red");
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        } catch (e) { 
            showMsg("Network Error", "red"); 
            loginBtn.classList.remove('loading');
            loginBtn.disabled = false;
        }
    }

    async function handleRegistration() {
        const name = document.getElementById('reg-name').value.trim();
        const mobile = document.getElementById('reg-mobile').value.trim();
        const state = document.getElementById('reg-state').value.trim();
        const pin = document.getElementById('reg-pin').value.trim();

        if (!name || mobile.length !== 10 || !state || pin.length !== 6) {
            showMsg("Fill all fields correctly", "red");
            return;
        }
        
        regBtn.classList.add('loading');
        regBtn.disabled = true;
        showMsg("Registering...", "cyan");

        try {
            const res = await fetch('/save_id', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, mobile, state, pin})
            });
            const data = await res.json();
            if (data.status === 'success') {
                showMsg("Success! Redirecting...", "lime");
                setTimeout(() => location.href = '/', 1000);
            } else {
                showMsg(data.message, "red");
                regBtn.classList.remove('loading');
                regBtn.disabled = false;
            }
        } catch (e) { 
            showMsg("Network Error", "red"); 
            regBtn.classList.remove('loading');
            regBtn.disabled = false;
        }
    }

    function showMsg(message, color) {
        msgDiv.textContent = message;
        msgDiv.style.color = color === "red" ? "#ff4444" : (color === "lime" ? "#00ff88" : "#00ffff");
    }
</script>
</body>
</html>

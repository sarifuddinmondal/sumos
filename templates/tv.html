
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Studio TV Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; }
        #side-dashboard { width: 380px; height: 100%; background: rgba(10, 10, 10, 0.98); border-right: 1px solid #00ffff55; transform: translateX(-100%); position: absolute; z-index: 100; backdrop-filter: blur(20px); transition: 0.4s; }
        body.show-list #side-dashboard { transform: translateX(0); }
        .list-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #333; }
        .channel-container { flex-grow: 1; overflow-y: auto; padding: 15px; height: calc(100% - 120px); }
        .channel-card { display: flex; align-items: center; gap: 15px; padding: 15px; margin-bottom: 10px; background: #151515; border-radius: 10px; border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
        .channel-card.active { background: rgba(0, 255, 255, 0.15); border-color: #00ffff; }
        #player-section { width: 100vw; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #osd { position: absolute; top: 50px; right: 50px; background: rgba(0,0,0,0.8); padding: 15px 35px; border-radius: 50px; border: 2px solid #00ffff; color: #00ffff; z-index: 200; display: none; }
        #number-osd { position: absolute; bottom: 50px; right: 50px; background: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 20px; border: 2px solid #fff; font-size: 40px; display: none; }
        .home-link { position: fixed; top: 20px; left: 20px; color: #fff; text-decoration: none; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 8px; z-index: 1001; }
    </style>
</head>
<body>
    <a href="/" class="home-link">Home</a>
    <div id="side-dashboard">
        <div class="list-header"><h2 style="color:#00ffff;">Studio TV Pro</h2></div>
        <div class="channel-container" id="channel-list"></div>
    </div>
    <div id="player-section">
        <div id="osd"></div><div id="number-osd"></div>
        <video id="main-player" autoplay playsinline muted></video>
    </div>
    <script>
        let channels = []; let currentIndex = 0; let isListVisible = false; let numberBuffer = ''; let numberBufferTimer; const video = document.getElementById('main-player'); let hls;

        async function initApp() {
            try {
                const res = await fetch('/tv/api/channels');
                channels = await res.json();
                if (channels.length > 0) {
                    currentIndex = Number(localStorage.getItem('lastChannelIndex')) || 0;
                    if (currentIndex >= channels.length) currentIndex = 0;
                    playStream(currentIndex, false); // First play is not user initiated
                    renderUI();
                } else {
                    showOSD("No channels found.");
                }
            } catch(e) { showOSD("Server Error"); }
        }

        function renderUI() {
            const list = document.getElementById('channel-list');
            if (!list) return;
            list.innerHTML = channels.map((ch, i) => `
                <div class="channel-card ${i === currentIndex ? 'active' : ''}" id="ch-${i}" onclick="playStream(${i}, true)">
                    <span style="color:#00ffff; font-weight:bold;">${i+1}</span> <span>${ch.name}</span>
                </div>`).join('');
            
            const activeEl = document.getElementById(`ch-${currentIndex}`);
            if (activeEl) {
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
        
        function playStream(i, userInitiated = false) {
            if (userInitiated && video.muted) {
                video.muted = false;
            }

            if (channels.length === 0) return;
            currentIndex = (i + channels.length) % channels.length;
            localStorage.setItem('lastChannelIndex', currentIndex);
            
            const streamUrl = channels[currentIndex].url;
            showOSD(`${currentIndex + 1}. ${channels[currentIndex].name}`);
            
            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy();
                }
                hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => {
                        console.error("Playback failed to start:", e);
                        if(userInitiated) showOSD("Playback failed. Try another channel.");
                    });
                });
                
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                showOSD("Network issue. Retrying...");
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                showOSD("Media error. Recovering...");
                                hls.recoverMediaError();
                                break;
                            default:
                                showOSD("Cannot play this channel.");
                                hls.destroy();
                                break;
                        }
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => {
                     video.play().catch(e => console.error("Playback failed", e));
                });
            }
            renderUI();
        }

        async function deleteCurrentChannel() {
            const ch = channels[currentIndex];
            if (confirm(`Remove ${ch.name} from list?`)) {
                await fetch('/tv/api/channels/delete', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({name: ch.name}) 
                });
                initApp(); // Reload channels
            }
        }

        document.addEventListener('keydown', (e) => {
            if (video.muted && e.key !== 'Escape') {
                video.muted = false;
                video.play().catch(()=>{}); 
            }
            
            const handledKeys = ['F10', 'Backspace', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Delete', 'm', 'Escape'];
            if (handledKeys.includes(e.key) || !isNaN(e.key)) {
                e.preventDefault();
            }
            
            if (e.key === 'Delete') { deleteCurrentChannel(); return; }

            if (!isNaN(e.key)) {
                clearTimeout(numberBufferTimer); 
                numberBuffer += e.key;
                const nosd = document.getElementById('number-osd'); 
                nosd.innerText = numberBuffer; 
                nosd.style.display = 'block';
                
                numberBufferTimer = setTimeout(() => {
                    const n = parseInt(numberBuffer, 10); 
                    numberBuffer = ''; 
                    nosd.style.display = 'none';
                    if (n > 0 && n <= channels.length) {
                        playStream(n - 1, true);
                    } else {
                        showOSD("Invalid Channel");
                    }
                }, 1500);
            }
            
            switch(e.key) {
                case "ArrowUp": playStream(currentIndex - 1, true); break;
                case "ArrowDown": playStream(currentIndex + 1, true); break;
                case "F10": case "m": 
                    isListVisible = !isListVisible; 
                    document.body.classList.toggle('show-list', isListVisible); 
                    if (isListVisible) {
                        renderUI();
                    }
                    break;
                case "Escape": case "Backspace": window.location.href = "/"; break;
            }
        });

        function showOSD(t) {
            const o = document.getElementById('osd'); o.innerText = t; o.style.display = 'block';
            clearTimeout(window.osdTimer); window.osdTimer = setTimeout(() => o.style.display = 'none', 3000);
        }

        window.onload = initApp;
    </script>
</body>
</html>

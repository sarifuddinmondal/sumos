<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background-color: #111;
        }
        .profile-info {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .profile-info img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-right: 20px;
        }
        .profile-info .details {
            text-align: left;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 80%;
            margin-top: 20px;
        }
        .settings-item {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .settings-item:hover {
            transform: scale(1.05);
        }
        .settings-item i {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .home-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 8px;
            transition: 0.2s;
            z-index: 10;
        }
        .home-link:hover {
            background: rgba(0, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <a href="/" class="home-link"><i class="fas fa-arrow-left"></i> Home</a>

    <div class="header">
        <h1>Settings</h1>
    </div>

    <div class="profile-info">
        <img src="{{ profile.get('profile_pic', 'https://i.ibb.co/V0vJ3KBV/icon.jpg') }}" alt="Profile Picture">
        <div class="details">
            <h2>{{ profile.get('name', 'Guest') }}</h2>
            <p>{{ profile.get('mobile', 'N/A') }}</p>
        </div>
    </div>

    <div class="settings-grid">
        <div class="settings-item" onclick="window.location.href='https://sumos-tv.web.app/packages.html'">
            <i class="fas fa-credit-card"></i>
            <span>Recharge</span>
        </div>
        <div class="settings-item" onclick="window.location.href='https://sumos-tv.web.app/help_desk.html'">
            <i class="fas fa-question-circle"></i>
            <span>Help Desk</span>
        </div>
        <div class="settings-item" onclick="window.location.href='/settings/remote'">
            <i class="fas fa-gamepad"></i>
            <span>Remote Control Settings</span>
        </div>
        <div class="settings-item" onclick="window.location.href='/login'">
            <i class="fas fa-sign-in-alt"></i>
            <span>Login</span>
        </div>
        <div class="settings-item" onclick="window.location.href='/adview?next=/settings'">
            <i class="fas fa-ad"></i>
            <span>Show Test Ad</span>
        </div>
    </div>

</body>
</html>
